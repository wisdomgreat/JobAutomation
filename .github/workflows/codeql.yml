name: "Sovereign Intelligence Audit (CodeQL)"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '30 4 * * 1' # Every Monday at 04:30 UTC

jobs:
  analyze:
    name: Analyze Intelligence Core
    runs-on: "windows-latest"
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [ 'python' ]

    steps:
    - name: 🛰️ Checkout Intelligence Core
      uses: actions/checkout@v4

    - name: 🔍 Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: ${{ matrix.language }}
        # Scanning the Python ecosystem for security vulnerabilities
        queries: security-and-quality

    - name: 🏗️ Autobuild (Standard Python)
      uses: github/codeql-action/autobuild@v3

    - name: ⚡ Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3
      with:
        category: "/language:${{matrix.language}}"
