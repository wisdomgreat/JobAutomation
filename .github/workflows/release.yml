name: Sovereign Pro Release Build

on:
  push:
    tags:
      - 'v*' # Trigger on version tags like v25.0

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    
    steps:
    - name: 🛰️ Checkout Intelligence Core
      uses: actions/checkout@v4

    - name: 🐍 Initialize Python Ecosystem
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'
        cache: 'pip'

    - name: 📦 Synchronize Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller customtkinter pillow python-dotenv

    - name: 🏗️ Stage 1: Build Software Engine (PyInstaller)
      run: python build.py

    - name: 🏗️ Stage 2: Compile Professional Installer (Inno Setup)
      # ISCC is pre-installed on windows-latest runners
      run: iscc SovereignInstaller.iss

    - name: 🧹 Stage 3: Generate Portable Asset
      run: Compress-Archive -Path dist/SovereignAgent -DestinationPath dist/SovereignAgent_Portable_v25.zip

    - name: 🚀 Launch Sovereign Pro Release
      uses: softprops/action-gh-release@v2
      with:
        name: Sovereign Agent ${{ github.ref_name }} (TDWAS Pro)
        files: |
          dist/Sovereign_Agent_Setup_v25.exe
          dist/SovereignAgent_Portable_v25.zip
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
